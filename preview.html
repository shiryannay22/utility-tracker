<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תצוגה מקדימה - מעקב מים וחשמל</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root{
    --bg: #f6f4ee;
    --ink: #1e2422;
    --panel: #ffffff;
    --panel-2: #f4f1ea;
    --line: #ece7d9;
    --water: #0e8da3;
    --water-dim: #e1f3f5;
    --electric: #c2790f;
    --electric-dim: #fcefd8;
    --muted: #8b8577;
    --alert: #c0503b;
    --good: #3f8f5a;
    --r-sm: 12px;
    --r-md: 18px;
    --r-lg: 24px;
    --r-pill: 999px;
    --shadow-sm: 0 1px 2px rgba(30,36,34,.03), 0 4px 10px rgba(30,36,34,.04);
    --shadow: 0 2px 6px rgba(30,36,34,.04), 0 16px 36px rgba(30,36,34,.07);
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Heebo', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #app-root{ max-width: 1080px; margin: 0 auto; padding: 28px 18px 70px; display:none; }

  /* ---------- auth gate ---------- */
  #auth-gate{
    min-height: 100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .auth-card{
    max-width: 420px; text-align:center; background: var(--panel);
    border-radius: var(--r-lg); padding: 40px 32px; box-shadow: var(--shadow);
  }
  .auth-card h1{ font-size:23px; margin: 4px 0 14px; font-weight:800; letter-spacing:-0.3px; }
  .auth-msg{ color: var(--muted); font-size:14px; line-height:1.7; margin-bottom:24px; }
  .auth-msg.denied{ color: var(--alert); }
  .btn.primary-mixed{
    background: var(--ink); color:#fff; font-weight:700;
    border:none; padding:13px 26px; border-radius: var(--r-pill); font-family:'Heebo',sans-serif; font-size:14px; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px; justify-content:center;
    transition: all .18s ease;
  }
  .btn.primary-mixed:hover{ transform: translateY(-1px); box-shadow: 0 8px 20px rgba(30,36,34,.25); }

  /* ---------- header ---------- */
  .hdr{ padding: 4px 4px 20px; margin-bottom: 18px; display:flex; justify-content:space-between; align-items:flex-end; gap:12px; flex-wrap:wrap;}
  .dual-bar{ height:5px; border-radius: var(--r-pill); overflow:hidden; display:flex; margin-bottom:22px; }
  .dual-bar span{ flex:1; }
  .dual-bar .w{ background: var(--water); }
  .dual-bar .e{ background: var(--electric); }
  .hdr h1{ font-size: 29px; font-weight: 800; margin:0; letter-spacing:-0.5px; }
  .hdr-user{ font-size:12px; color: var(--muted); text-align:left; line-height:1.6; }
  .hdr-user a{ color: var(--muted); text-decoration:underline; cursor:pointer; }

  /* ---------- tab bar ---------- */
  .tab-bar{
    display:flex; gap:4px; background: var(--panel); border-radius: var(--r-pill);
    padding: 6px; margin-bottom: 22px; box-shadow: var(--shadow-sm);
  }
  .tab-pill{
    flex:1; display:flex; align-items:center; justify-content:center; gap:8px;
    border:none; background:transparent; color: var(--muted);
    font-family:'Heebo',sans-serif; font-size:14px; font-weight:600;
    padding: 12px 14px; border-radius: var(--r-pill); cursor:pointer; transition: all .2s ease;
  }
  .tab-pill:hover{ color: var(--ink); }
  .tab-pill .icon{ width:17px; height:17px; }
  .tab-pill.active{ color:#fff; }
  .tab-pill.active.water{ background: var(--water); box-shadow: 0 6px 16px rgba(14,141,163,.35); }
  .tab-pill.active.electric{ background: var(--electric); box-shadow: 0 6px 16px rgba(194,121,15,.32); }
  .tab-pill.active.dash{ background: var(--ink); box-shadow: 0 6px 16px rgba(30,36,34,.25); }

  /* ---------- upload dock ---------- */
  .upload-dock{
    box-shadow: var(--shadow-sm);
    display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
    background: var(--panel); border-radius: var(--r-lg); padding:18px 22px; margin-bottom:16px;
  }
  .upload-dock-text strong{ font-size:15px; font-weight:700; }
  .upload-dock-actions{ display:flex; gap:10px; flex-wrap:wrap; }
  .btn.upload-btn{
    background: var(--ink); color:#fff; font-weight:700;
    border:none; white-space:nowrap; display:inline-flex; align-items:center; gap:8px;
  }
  .btn.upload-btn.disabled{ opacity:.5; pointer-events:none; }
  .icon{ width:16px; height:16px; flex-shrink:0; }
  .icon-btn{ display:inline-flex; align-items:center; justify-content:center; }
  .icon-btn .icon{ width:14px; height:14px; }
  .status-banner{
    border-radius: var(--r-md); padding:13px 18px; font-size:13px; margin-bottom:18px; line-height:1.6;
  }
  .status-banner.loading{ background: var(--panel-2); color: var(--muted); }
  .status-banner.loading::before{ content:'⏳ '; }
  .status-banner.success{ background: rgba(63,143,90,0.1); color: var(--good); }
  .status-banner.error{ background: rgba(192,80,59,0.1); color: var(--alert); }

  /* ---------- section ---------- */
  .section-title{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .section-title h2{ font-size:21px; margin:0; display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:-0.3px; }
  .section-title h2::before{ content:''; width:10px; height:10px; border-radius:3px; flex-shrink:0; }
  .accent-water{ color: var(--water); }
  .accent-water::before{ background: var(--water); }
  .accent-electric{ color: var(--electric); }
  .accent-electric::before{ background: var(--electric); }

  .btn{
    font-family:'Heebo',sans-serif; font-size:13.5px; font-weight:600; border-radius: var(--r-pill); border:none;
    background: var(--panel-2); color: var(--ink); padding:11px 20px; cursor:pointer; transition: all .18s ease;
    display:inline-flex; align-items:center; gap:7px; justify-content:center;
  }
  .btn:hover{ transform: translateY(-1px); }
  .btn.primary.water{ background: var(--water); color:#fff; box-shadow: 0 6px 16px rgba(14,141,163,.3); }
  .btn.primary.electric{ background: var(--electric); color:#fff; box-shadow: 0 6px 16px rgba(194,121,15,.28); }
  .btn.ghost{ background: var(--panel-2); box-shadow:none; }

  /* ---------- form card ---------- */
  .form-card{
    background: var(--panel); border-radius: var(--r-lg); padding:22px;
    margin-bottom:20px; display:none; box-shadow: var(--shadow);
  }
  .form-card.open{ display:block; }
  .form-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap:12px; margin-bottom: 14px; }
  .field label{ display:block; font-size:11.5px; color:var(--muted); margin-bottom:6px; letter-spacing:.2px; font-weight:600; }
  .field input{
    width:100%; background: var(--panel-2); border:1.5px solid transparent; border-radius: var(--r-sm); color: var(--ink);
    padding:10px 12px; font-family:'JetBrains Mono', monospace; font-size:13px; transition: all .15s ease;
  }
  .field input:focus{ outline:none; border-color: var(--water); background: var(--panel); box-shadow: 0 0 0 4px var(--water-dim); }
  .field.notes input{ font-family:'Heebo',sans-serif; }
  .form-actions{ display:flex; gap:10px; justify-content:flex-start; }

  .combined-groups{ display:grid; grid-template-columns: 1fr 1fr; gap:24px; margin-top:18px; }
  .combined-group h4{ display:flex; align-items:center; gap:7px; font-size:14.5px; margin:0 0 14px; font-weight:700; }
  .combined-group h4 .dot{ width:8px; height:8px; }
  .combined-group.water h4{ color: var(--water); }
  .combined-group.electric h4{ color: var(--electric); }
  .shared-dates{ display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap:12px; padding-bottom:18px; margin-bottom:18px; border-bottom:1.5px dashed var(--line); }
  @media (max-width: 720px){
    .combined-groups{ grid-template-columns: 1fr; }
  }

  /* ---------- table ---------- */
  .table-wrap{ overflow-x:auto; border-radius: var(--r-lg); box-shadow: var(--shadow); background: var(--panel); }
  table{ width:100%; border-collapse:collapse; min-width: 780px; }
  thead th{
    font-size:11px; color:var(--muted); text-align:center; font-weight:600; letter-spacing:.3px;
    padding:14px 10px; background: var(--panel-2); white-space:nowrap;
  }
  .table-wrap.water thead th{ background: var(--water-dim); color: var(--water); font-weight:700; }
  .table-wrap.electric thead th{ background: var(--electric-dim); color: var(--electric); font-weight:700; }
  tbody td{
    text-align:center; padding:13px 10px; font-family:'JetBrains Mono', monospace; font-size:13px;
    border-bottom:1px solid var(--panel-2); white-space:nowrap;
  }
  tbody tr{ background: var(--panel); transition: background .15s ease; }
  tbody tr:hover{ background: var(--panel-2); }
  tbody tr:last-child td{ border-bottom:none; }
  .meter{ font-weight:700; letter-spacing:.3px; }
  .meter.water{ color: var(--water); }
  .meter.electric{ color: var(--electric); }
  .amount-chip{
    display:inline-block; font-family:'JetBrains Mono',monospace; font-weight:800;
    padding:6px 14px; border-radius: var(--r-pill); letter-spacing:.2px;
  }
  .amount-chip.water{ background: var(--water-dim); color: var(--water); }
  .amount-chip.electric{ background: var(--electric-dim); color: var(--electric); }
  .row-actions{ display:flex; gap:6px; justify-content:center; }
  .icon-btn{
    background: var(--panel-2); border:none; color:var(--muted); border-radius: var(--r-pill);
    width:30px; height:30px; cursor:pointer; font-size:12px; line-height:1; transition: all .15s ease;
  }
  .icon-btn:hover{ color:var(--ink); background: var(--line); transform: translateY(-1px); }
  .empty-row td{ padding: 40px 10px; color: var(--muted); font-family:'Heebo',sans-serif; }

  /* ---------- dashboard ---------- */
  @keyframes cardIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
  .cards{ display:grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap:14px; margin-bottom:22px; }
  .card{ background: var(--panel); border-radius: var(--r-lg); padding:20px; box-shadow: var(--shadow-sm); animation: cardIn .5s ease both; transition: transform .18s ease, box-shadow .18s ease; }
  .card:hover{ transform: translateY(-2px); box-shadow: var(--shadow); }
  .card.water-tint{ background: var(--water-dim); }
  .card.electric-tint{ background: var(--electric-dim); }
  .card .k{ font-size:11.5px; color:var(--muted); margin-bottom:10px; letter-spacing:.2px; font-weight:600; }
  .card .v{ font-family:'JetBrains Mono', monospace; font-size:27px; font-weight:800; letter-spacing:-0.5px; }
  .card .v.water{ color: var(--water); } .card .v.electric{ color: var(--electric); }
  .card .d{ font-size:11.5px; color:var(--muted); margin-top:8px; }
  .trend{ display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:700; padding:3px 9px; border-radius: var(--r-pill); margin-inline-start:8px; vertical-align:middle; font-family:'Heebo',sans-serif; }
  .trend.up{ color: var(--alert); background: rgba(192,80,59,0.1); }
  .trend.down{ color: var(--good); background: rgba(63,143,90,0.1); }

  .chart-card{ background: var(--panel); border-radius: var(--r-lg); padding:22px; margin-bottom:18px; box-shadow: var(--shadow-sm); animation: cardIn .5s ease both; position:relative; }
  .chart-card h3{ margin:0 0 4px; font-size:16px; font-weight:700; }
  .chart-card .cap{ margin:0 0 16px; font-size:12.5px; color: var(--muted); }
  .legend{ display:flex; gap:16px; margin-bottom:12px; font-size:12px; color:var(--muted); }
  .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
  .dot.water{ background: var(--water); } .dot.electric{ background: var(--electric); }
  .chart-dot{ cursor:pointer; }
  .chart-tooltip{
    position:absolute; pointer-events:none; background: var(--ink); color:#fff; font-size:11px;
    padding:7px 11px; border-radius: var(--r-sm); transform:translate(-50%,-130%); white-space:nowrap; z-index:6;
    opacity:0; transition:opacity .12s ease; font-family:'JetBrains Mono',monospace;
  }
  .chart-tooltip.show{ opacity:1; }
  .chart-tooltip::after{ content:''; position:absolute; left:50%; bottom:-4px; transform:translateX(-50%); border:5px solid transparent; border-top-color: var(--ink); }

  .donut-wrap{ display:flex; align-items:center; gap:28px; flex-wrap:wrap; }
  .donut-legend{ display:flex; flex-direction:column; gap:11px; font-size:13.5px; flex:1; min-width:140px; font-weight:600; }
  .donut-legend .row{ display:flex; align-items:center; gap:8px; }
  .donut-legend .pct{ margin-inline-start:auto; font-family:'JetBrains Mono',monospace; font-weight:700; }

  .empty-state{ text-align:center; padding:56px 20px; color:var(--muted); font-size:13px; }

  footer.note{ text-align:center; color:var(--muted); font-size:11.5px; margin-top:34px; line-height:1.8; }

  @media (max-width: 560px){
    .hdr h1{ font-size:23px; }
    .tab-pill{ font-size:12.5px; padding:10px 8px; }
    .tab-pill span{ display:none; }
    .card .v{ font-size:22px; }
  }

  /* ---------- mobile card-style tables ---------- */
  @media (max-width: 720px){
    .table-wrap{ box-shadow:none; background:transparent; }
    table{ min-width:0; }
    thead{ display:none; }
    tbody, tr, td{ display:block; width:100%; }
    tbody tr{
      background: var(--panel); box-shadow: var(--shadow-sm); border-radius: var(--r-md);
      padding:14px 16px; margin-bottom:12px;
    }
    tbody td{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      border-bottom:1px dashed var(--panel-2); padding:9px 0; white-space:normal; text-align:left;
    }
    tbody td:last-child{ border-bottom:none; padding-top:12px; }
    tbody td::before{
      content: attr(data-label); color:var(--muted); font-family:'Heebo',sans-serif;
      font-size:11.5px; flex-shrink:0; font-weight:600;
    }
    tbody td.notes-cell{ justify-content:flex-start; }
    tbody td.notes-cell::before{ margin-left:8px; }
    .row-actions{ width:100%; justify-content:flex-end; }
    .form-grid{ grid-template-columns: 1fr 1fr; }
    .empty-row{ box-shadow:none !important; background:transparent !important; padding:0 !important; }
    .empty-row td{ display:block; text-align:center; padding:34px 10px; }
    .empty-row td::before{ content:none; }
  }
  @media (max-width: 380px){
    .form-grid{ grid-template-columns: 1fr; }
    .tab-bar{ gap:2px; padding:5px; }
  }

  .preview-badge{
    position: sticky; top:0; z-index: 20; background: var(--ink); color:#fff; text-align:center;
    font-size:12px; padding:8px; letter-spacing:.3px;
  }

</style>
</head>
<body>

<div class="preview-badge">🔍 תצוגה מקדימה של העיצוב בלבד - עם נתוני דוגמה, בלי Firebase אמיתי</div>

<div id="app-root" style="display:block;">
  <div class="hdr">
    <div>
      <h1>מעקב הוצאות מים וחשמל</h1>
    </div>
    <div class="hdr-user">מחוברים כ- <span id="user-email">you@gmail.com</span><br><a>התנתקות</a></div>
  </div>

  <div class="dual-bar"><span class="w"></span><span class="e"></span></div>

  <div class="tab-bar">
    <button class="tab-pill water active" data-tab="water"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg><span>מים</span></button>
    <button class="tab-pill electric" data-tab="electric"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg><span>חשמל</span></button>
    <button class="tab-pill dash" data-tab="dash"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>דשבורד</span></button>
  </div>

  <div class="upload-dock">
    <div class="upload-dock-text">
      <strong>הוספת קריאה חדשה</strong>
    </div>
    <div class="upload-dock-actions">
      <button class="btn" id="manual-add-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>הזנה ידנית</button>
      <label class="btn upload-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>העלאת תמונה</label>
    </div>
  </div>
  <div class="form-card" id="combined-form"></div>

  <div id="tab-water"></div>
  <div id="tab-electric" style="display:none"></div>
  <div id="tab-dash" style="display:none"></div>

  <footer class="note">זוהי תצוגה מקדימה בלבד - הנתונים כאן הם דוגמה, ולא נשמרים.</footer>
</div>

<script>
(function(){
  "use strict";

  const state = {
    water: [
      { id:'w1', prevDate:'2025-12-25', prevReading:'340.10', currDate:'2026-02-25', currReading:'349.00', qtyA:'7', priceA:'9.68', qtyB:'2', priceB:'22.00', sewage:'6.30', total:'175', notes:'דצמבר-פברואר' },
      { id:'w2', prevDate:'2025-10-25', prevReading:'331.00', currDate:'2025-12-25', currReading:'340.10', qtyA:'9', priceA:'9.68', qtyB:'0', priceB:'', sewage:'0', total:'93', notes:'אוקטובר-דצמבר' }
    ],
    electric: [
      { id:'e1', prevDate:'2025-12-25', prevReading:'58090', currDate:'2026-02-25', currReading:'58425', priceAgorot:'52', total:'273', notes:'דצמבר-פברואר' },
      { id:'e2', prevDate:'2025-10-25', prevReading:'57800', currDate:'2025-12-25', currReading:'58090', priceAgorot:'52', total:'230', notes:'אוקטובר-דצמבר' }
    ]
  };

  const fmt = (n, d=2) => (isFinite(n) ? Number(n).toLocaleString('he-IL', {minimumFractionDigits:0, maximumFractionDigits:d}) : '—');
  const money = (n) => isFinite(n) ? '₪' + fmt(n) : '—';
  const sortByDate = (arr) => [...arr].sort((a,b) => new Date(a.currDate||0) - new Date(b.currDate||0));

  function waterCalc(e){
    const consumption = (e.currReading!=='' && e.prevReading!=='') ? (Number(e.currReading) - Number(e.prevReading)) : null;
    const autoTotal = (Number(e.qtyA||0)*Number(e.priceA||0)) + (Number(e.qtyB||0)*Number(e.priceB||0)) + Number(e.sewage||0);
    return { consumption, autoTotal };
  }
  function electricCalc(e){
    const consumption = (e.currReading!=='' && e.prevReading!=='') ? (Number(e.currReading) - Number(e.prevReading)) : null;
    const autoTotal = (consumption!=null && e.priceAgorot!=='') ? (consumption * Number(e.priceAgorot) / 100) : null;
    return { consumption, autoTotal };
  }

  function renderWater(){
    const root = document.getElementById('tab-water');
    const list = sortByDate(state.water);
    root.innerHTML = `
      <div class="section-title">
        <h2 class="accent-water">מים</h2>
      </div>
      <div class="table-wrap water">
        <table>
          <thead><tr>
            <th>תאריך קריאה קודמת</th><th>קריאה קודמת (מ"ק)</th>
            <th>תאריך קריאה נוכחית</th><th>קריאה נוכחית (מ"ק)</th>
            <th>צריכה (מ"ק)</th>
            <th>כמות ת. א' / מחיר</th><th>כמות ת. ב' / מחיר</th>
            <th>ביוב (₪)</th><th>סה"כ לתשלום</th><th>הערות</th><th></th>
          </tr></thead>
          <tbody>${list.map(e => {
            const { consumption, autoTotal } = waterCalc(e);
            const total = (e.total!=='' && e.total!=null) ? Number(e.total) : autoTotal;
            return `<tr>
              <td data-label="תאריך קריאה קודמת">${e.prevDate}</td>
              <td data-label="קריאה קודמת"><span class="meter water">${fmt(e.prevReading,2)}</span></td>
              <td data-label="תאריך קריאה נוכחית">${e.currDate}</td>
              <td data-label="קריאה נוכחית"><span class="meter water">${fmt(e.currReading,2)}</span></td>
              <td data-label="צריכה (מ״ק)">${consumption!=null?fmt(consumption,2):'—'}</td>
              <td data-label="תעריף א׳">${fmt(e.qtyA,2)} / ${money(e.priceA)}</td>
              <td data-label="תעריף ב׳">${fmt(e.qtyB,2)} / ${money(e.priceB)}</td>
              <td data-label="ביוב">${money(e.sewage)}</td>
              <td data-label="סה״כ"><span class="amount-chip water">${money(total)}</span></td>
              <td class="sub notes-cell" data-label="הערות" style="font-family:'Heebo',sans-serif; white-space:normal; max-width:140px;">${e.notes||''}</td>
              <td data-label=""><div class="row-actions"><button class="icon-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button><button class="icon-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button></div></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>`;
  }

  function renderElectric(){
    const root = document.getElementById('tab-electric');
    const list = sortByDate(state.electric);
    root.innerHTML = `
      <div class="section-title">
        <h2 class="accent-electric">חשמל</h2>
      </div>
      <div class="table-wrap electric">
        <table>
          <thead><tr>
            <th>תאריך קריאה קודמת</th><th>קריאה קודמת (קוט"ש)</th>
            <th>תאריך קריאה נוכחית</th><th>קריאה נוכחית (קוט"ש)</th>
            <th>צריכה (קוט"ש)</th>
            <th>מחיר לקוט"ש (אג')</th><th>סה"כ לתשלום</th><th>הערות</th><th></th>
          </tr></thead>
          <tbody>${list.map(e => {
            const { consumption, autoTotal } = electricCalc(e);
            const total = (e.total!=='' && e.total!=null) ? Number(e.total) : autoTotal;
            return `<tr>
              <td data-label="תאריך קריאה קודמת">${e.prevDate}</td>
              <td data-label="קריאה קודמת"><span class="meter electric">${fmt(e.prevReading,2)}</span></td>
              <td data-label="תאריך קריאה נוכחית">${e.currDate}</td>
              <td data-label="קריאה נוכחית"><span class="meter electric">${fmt(e.currReading,2)}</span></td>
              <td data-label="צריכה (קוט״ש)">${consumption!=null?fmt(consumption,2):'—'}</td>
              <td data-label="מחיר">${fmt(e.priceAgorot,2)}</td>
              <td data-label="סה״כ לתשלום"><span class="amount-chip electric">${total!=null?money(total):'—'}</span></td>
              <td class="sub notes-cell" data-label="הערות" style="font-family:'Heebo',sans-serif; white-space:normal; max-width:140px;">${e.notes||''}</td>
              <td data-label=""><div class="row-actions"><button class="icon-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button><button class="icon-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button></div></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>`;
  }

  function lineChart(points, color, valueFmt, width=680, height=180){
    if(points.length < 1) return `<div class="empty-state">אין עדיין מספיק נתונים לגרף</div>`;
    const pad = {t:16,r:16,b:26,l:44};
    const w = width - pad.l - pad.r, h = height - pad.t - pad.b;
    const ys = points.map(p=>p.v);
    const minY = Math.min(0, ...ys), maxY = Math.max(...ys, 1);
    const x = i => pad.l + (points.length<=1? w/2 : (i/(points.length-1))*w);
    const y = v => pad.t + h - ((v-minY)/((maxY-minY)||1))*h;
    const path = points.map((p,i)=> (i===0?'M':'L') + x(i).toFixed(1) + ',' + y(p.v).toFixed(1)).join(' ');
    const area = path + ` L${x(points.length-1).toFixed(1)},${(pad.t+h).toFixed(1)} L${x(0).toFixed(1)},${(pad.t+h).toFixed(1)} Z`;
    const gridY = [0,0.5,1].map(f => pad.t + h - f*h);
    const dots = points.map((p,i)=>{
      const cx=x(i).toFixed(1), cy=y(p.v).toFixed(1);
      const tip = `${p.label} · ${valueFmt(p.v)}`;
      return `<circle cx="${cx}" cy="${cy}" r="3.5" fill="${color}"></circle>
      <circle cx="${cx}" cy="${cy}" r="11" fill="transparent" class="chart-dot" data-tip="${tip}"></circle>
      <text x="${cx}" y="${height-6}" font-size="9.5" fill="var(--muted)" font-family="JetBrains Mono, monospace" text-anchor="middle">${p.label}</text>`;
    }).join('');
    return `<svg viewBox="0 0 ${width} ${height}" width="100%" style="overflow:visible">
      ${gridY.map(gy=>`<line x1="${pad.l}" y1="${gy.toFixed(1)}" x2="${width-pad.r}" y2="${gy.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`).join('')}
      <path d="${area}" fill="${color}" opacity="0.12" stroke="none"/>
      <path class="line-path" d="${path}" fill="none" stroke="${color}" stroke-width="2.5"/>
      ${dots}
      <text x="${pad.l-6}" y="${pad.t+6}" font-size="9.5" fill="var(--muted)" font-family="JetBrains Mono, monospace" text-anchor="end">${fmt(maxY,0)}</text>
      <text x="${pad.l-6}" y="${(pad.t+h).toFixed(1)}" font-size="9.5" fill="var(--muted)" font-family="JetBrains Mono, monospace" text-anchor="end">${fmt(minY,0)}</text>
    </svg>`;
  }

  function donutChart(sumWater, sumEl){
    const total = sumWater + sumEl;
    if (total <= 0) return '';
    const r = 46, circ = 2*Math.PI*r;
    const waterPct = sumWater/total, elPct = sumEl/total;
    const waterLen = circ*waterPct, elLen = circ*elPct;
    return `
    <div class="donut-wrap">
      <svg viewBox="0 0 120 120" width="140" height="140">
        <circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--line)" stroke-width="14"/>
        <circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--water)" stroke-width="14"
          stroke-dasharray="${waterLen.toFixed(1)} ${(circ-waterLen).toFixed(1)}" stroke-linecap="round"
          transform="rotate(-90 60 60)"/>
        <circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--electric)" stroke-width="14"
          stroke-dasharray="${elLen.toFixed(1)} ${(circ-elLen).toFixed(1)}" stroke-dashoffset="${(-waterLen).toFixed(1)}" stroke-linecap="round"
          transform="rotate(-90 60 60)"/>
        <text x="60" y="57" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="var(--ink)">${money(total)}</text>
        <text x="60" y="73" text-anchor="middle" font-family="Heebo, sans-serif" font-size="9" fill="var(--muted)">סה"כ במעקב</text>
      </svg>
      <div class="donut-legend">
        <div class="row"><span class="dot water"></span>מים<span class="pct" style="color:var(--water)">${(waterPct*100).toFixed(0)}%</span></div>
        <div class="row"><span class="dot electric"></span>חשמל<span class="pct" style="color:var(--electric)">${(elPct*100).toFixed(0)}%</span></div>
      </div>
    </div>`;
  }

  function trendBadge(current, previous){
    if (previous == null || !isFinite(previous) || previous === 0 || current == null) return '';
    const diff = current - previous;
    const pct = (diff/previous)*100;
    if (Math.abs(pct) < 0.5) return '';
    const up = diff > 0;
    return `<span class="trend ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(pct).toFixed(0)}%</span>`;
  }

  function animateCharts(root){
    root.querySelectorAll('.line-path').forEach(path=>{
      const len = path.getTotalLength();
      path.style.strokeDasharray = len;
      path.style.strokeDashoffset = len;
      requestAnimationFrame(()=>{
        path.style.transition = 'stroke-dashoffset 0.9s ease';
        path.style.strokeDashoffset = 0;
      });
    });
    root.querySelectorAll('.chart-card').forEach(card=>{
      if (card.querySelector('.chart-tooltip')) return;
      const tooltip = document.createElement('div');
      tooltip.className = 'chart-tooltip';
      card.appendChild(tooltip);
      card.querySelectorAll('.chart-dot').forEach(dot=>{
        const show = () => {
          const dr = dot.getBoundingClientRect(), cr = card.getBoundingClientRect();
          tooltip.style.left = (dr.left - cr.left + dr.width/2) + 'px';
          tooltip.style.top = (dr.top - cr.top) + 'px';
          tooltip.textContent = dot.dataset.tip;
          tooltip.classList.add('show');
        };
        const hide = () => tooltip.classList.remove('show');
        dot.addEventListener('mouseenter', show);
        dot.addEventListener('mouseleave', hide);
        dot.addEventListener('touchstart', (ev)=>{ ev.preventDefault(); show(); setTimeout(hide, 1800); }, {passive:false});
      });
    });
  }

  function renderDash(){
    const root = document.getElementById('tab-dash');
    const w = sortByDate(state.water), el = sortByDate(state.electric);
    const shortDate = d => d ? d.slice(5).split('-').reverse().join('/') : '';

    const waterTotals = w.map(e=>{ const {autoTotal} = waterCalc(e); const t=(e.total!==''&&e.total!=null)?Number(e.total):autoTotal; return {v:t, label:shortDate(e.currDate)}; });
    const elTotals = el.map(e=>{ const {autoTotal} = electricCalc(e); const t=(e.total!==''&&e.total!=null)?Number(e.total):autoTotal; return {v:(t||0), label:shortDate(e.currDate)}; });
    const waterCons = w.map(e=>{ const {consumption} = waterCalc(e); return {v:(consumption||0), label:shortDate(e.currDate)}; });
    const elCons = el.map(e=>{ const {consumption} = electricCalc(e); return {v:(consumption||0), label:shortDate(e.currDate)}; });

    const lastWater = waterTotals[waterTotals.length-1];
    const prevWater = waterTotals[waterTotals.length-2];
    const lastEl = elTotals[elTotals.length-1];
    const prevEl = elTotals[elTotals.length-2];
    const sumWater = waterTotals.reduce((s,p)=>s+(p.v||0),0);
    const sumEl = elTotals.reduce((s,p)=>s+(p.v||0),0);

    root.innerHTML = `
      <div class="section-title"><h2>דשבורד</h2></div>
      <div class="cards">
        <div class="card water-tint"><div class="k">חשבון מים אחרון</div><div class="v water">${lastWater?money(lastWater.v):'—'}${trendBadge(lastWater&&lastWater.v, prevWater&&prevWater.v)}</div><div class="d">${w.length} חשבונות במעקב</div></div>
        <div class="card electric-tint"><div class="k">חשבון חשמל אחרון</div><div class="v electric">${lastEl?money(lastEl.v):'—'}${trendBadge(lastEl&&lastEl.v, prevEl&&prevEl.v)}</div><div class="d">${el.length} חשבונות במעקב</div></div>
        <div class="card water-tint"><div class="k">סה"כ מים במעקב</div><div class="v water">${money(sumWater)}</div></div>
        <div class="card electric-tint"><div class="k">סה"כ חשמל במעקב</div><div class="v electric">${money(sumEl)}</div></div>
      </div>
      <div class="chart-card">
        <h3>התפלגות עלויות</h3>
        <p class="cap">היחס בין מים לחשמל מתוך כל מה שהוזן</p>
        ${donutChart(sumWater, sumEl)}
      </div>
      <div class="chart-card">
        <h3>עלות לתשלום לאורך זמן</h3>
        <p class="cap">כל נקודה = חשבון שהוזן - עברו עם העכבר מעל נקודה לפרטים</p>
        <div class="legend"><span><span class="dot water"></span>מים</span><span><span class="dot electric"></span>חשמל</span></div>
        ${lineChart(waterTotals, 'var(--water)', money)}
        ${lineChart(elTotals, 'var(--electric)', money)}
      </div>
      <div class="chart-card">
        <h3>צריכת מים (מ"ק)</h3>
        <p class="cap">כמות המים שנצרכה בין קריאה לקריאה</p>
        ${lineChart(waterCons, 'var(--water)', v => fmt(v,2) + ' מ"ק')}
      </div>
      <div class="chart-card">
        <h3>צריכת חשמל (קוט"ש)</h3>
        <p class="cap">כמות החשמל שנצרכה בין קריאה לקריאה</p>
        ${lineChart(elCons, 'var(--electric)', v => fmt(v,2) + ' קוט"ש')}
      </div>`;
    animateCharts(root);
  }

  function openCombinedForm(){
    const card = document.getElementById('combined-form');
    card.classList.add('open');
    card.innerHTML = `
      <div class="section-title"><h2>הוספת קריאה חדשה</h2></div>
      <div class="shared-dates">
        <div class="field"><label>תאריך קריאה קודמת</label><input type="date" id="c-prevDate"></div>
        <div class="field"><label>תאריך קריאה נוכחית</label><input type="date" id="c-currDate"></div>
      </div>
      <div class="combined-groups">
        <div class="combined-group water">
          <h4><span class="dot water"></span>מים</h4>
          <div class="form-grid">
            <div class="field"><label>קריאה קודמת (מ"ק)</label><input type="number" step="0.01" id="c-w-prevReading"></div>
            <div class="field"><label>קריאה נוכחית (מ"ק)</label><input type="number" step="0.01" id="c-w-currReading"></div>
            <div class="field"><label>כמות תעריף א' (מ"ק)</label><input type="number" step="0.01" id="c-w-qtyA"></div>
            <div class="field"><label>מחיר תעריף א' (₪/מ"ק)</label><input type="number" step="0.0001" id="c-w-priceA"></div>
            <div class="field"><label>כמות תעריף ב' (מ"ק)</label><input type="number" step="0.01" id="c-w-qtyB"></div>
            <div class="field"><label>מחיר תעריף ב' (₪/מ"ק)</label><input type="number" step="0.0001" id="c-w-priceB"></div>
            <div class="field"><label>עלות ביוב (₪)</label><input type="number" step="0.01" id="c-w-sewage"></div>
            <div class="field"><label>סה"כ לתשלום (₪)</label><input type="number" step="0.01" id="c-w-total" placeholder="ריק = חישוב אוטומטי"></div>
          </div>
        </div>
        <div class="combined-group electric">
          <h4><span class="dot electric"></span>חשמל</h4>
          <div class="form-grid">
            <div class="field"><label>קריאה קודמת (קוט"ש)</label><input type="number" step="0.01" id="c-e-prevReading"></div>
            <div class="field"><label>קריאה נוכחית (קוט"ש)</label><input type="number" step="0.01" id="c-e-currReading"></div>
            <div class="field"><label>מחיר לקוט"ש (אג')</label><input type="number" step="0.01" id="c-e-priceAgorot"></div>
            <div class="field"><label>סה"כ לתשלום (₪)</label><input type="number" step="0.01" id="c-e-total" placeholder="ריק = חישוב אוטומטי"></div>
          </div>
        </div>
      </div>
      <div class="field notes" style="margin-top:16px;"><label>הערות</label><input type="text" id="c-notes" placeholder="לדוגמה: חודש חם, תיקון נזילה..."></div>
      <div class="form-actions" style="margin-top:16px;">
        <button class="btn primary water" id="c-save">שמירה</button>
        <button class="btn ghost" id="c-cancel">ביטול</button>
      </div>`;
    card.querySelector('#c-cancel').onclick = () => { card.classList.remove('open'); card.innerHTML = ''; };
    card.querySelector('#c-save').onclick = () => {
      const val = id => card.querySelector('#' + id).value;
      const prevDate = val('c-prevDate'), currDate = val('c-currDate'), notes = val('c-notes');
      const wId = 'w' + Date.now(), eId = 'e' + Date.now();
      state.water.push({ id: wId, pairId: eId, prevDate, currDate, prevReading: val('c-w-prevReading'), currReading: val('c-w-currReading'), qtyA: val('c-w-qtyA'), priceA: val('c-w-priceA'), qtyB: val('c-w-qtyB'), priceB: val('c-w-priceB'), sewage: val('c-w-sewage'), total: val('c-w-total'), notes });
      state.electric.push({ id: eId, pairId: wId, prevDate, currDate, prevReading: val('c-e-prevReading'), currReading: val('c-e-currReading'), priceAgorot: val('c-e-priceAgorot'), total: val('c-e-total'), notes });
      card.classList.remove('open'); card.innerHTML = '';
      renderWater(); renderElectric(); renderDash();
    };
  }
  document.getElementById('manual-add-btn').onclick = () => openCombinedForm();

  function switchTab(tab){
    document.querySelectorAll('.tab-pill').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
    document.getElementById('tab-water').style.display = tab==='water' ? 'block':'none';
    document.getElementById('tab-electric').style.display = tab==='electric' ? 'block':'none';
    document.getElementById('tab-dash').style.display = tab==='dash' ? 'block':'none';
  }
  document.querySelectorAll('.tab-pill').forEach(b => b.onclick = () => switchTab(b.dataset.tab));

  renderWater(); renderElectric(); renderDash();
})();
</script>
</body>
</html>
